name: blend-events
version: 17
resource_size: m
from_snapshot:
  id: snapshot-cmj0pw001n93301tlaue331af
  created_at: 1765413986600
apiVersion: 3
sources:
  stellar.events:
    dataset_name: stellar.events
    version: 3.2.0
    type: dataset
    start_at: latest
transforms:
  backstop_events:
    type: sql
    primary_key: id
    sql: |-
      SELECT * FROM stellar.events
            WHERE type = 'contract'
              AND in_successful_contract_call = true
              AND contract_id = 'CAQQR5SWBXKIGZKPBZDH3KM5GQ5GUTPKB7JAFCINLZBC5WXPJKRG3IM7'
  blend_events:
    type: sql
    primary_key: id
    sql: |-
      SELECT * FROM stellar.events
      WHERE type = 'contract'
        AND in_successful_contract_call = true
        AND contract_id IN (
          'CAJJZSGMMM3PD7N33TAPHGBUGTB43OC73HVIK2L2G6BNGGGYOSSYBXBD',
          'CCCCIQSDILITHMM7PBSLVDT5MISSY7R26MNZXCX4H7J5JQ5FPIYOGYFS',
          'CAE7QVOMBLZ53CDRGK3UNRRHG5EZ5NQA7HHTFASEMYBWHG6MDFZTYHXC',
          'CBYOBT7ZCCLQCBUYYIABZLSEGDPEUWXCUXQTZYOG3YBDR7U357D5ZIRF',
          'CDMAVJPFXPADND3YRL4BSM3AKZWCTFMX27GLLXCML3PD62HEQS5FPVAI'
        )
  parsed_backstop_events:
    type: sql
    primary_key: id
    sql: |-
      SELECT
              -- Construct ID using content hash of PARSED values: {ledger}-{hash16}
              -- Hash uses the same parsed values that get stored in the database
              CONCAT(
                CAST(ledger_sequence AS VARCHAR), '-',
                SUBSTRING(SHA2(CONCAT(
                  COALESCE(transaction_hash, ''),
                  -- action_type
                  COALESCE(JSON_VALUE(topics, '$[0].symbol'), ''),
                  -- pool_address (NULL for claim)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim' THEN NULL
                    ELSE JSON_VALUE(topics, '$[1].address')
                  END, ''),
                  -- user_address
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim' THEN JSON_VALUE(topics, '$[1].address')
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('gulp_emissions', 'draw') THEN NULL
                    ELSE JSON_VALUE(topics, '$[2].address')
                  END, ''),
                  -- lp_tokens (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'deposit' THEN COALESCE(JSON_VALUE(data, '$.vec[0].i128'), JSON_VALUE(data, '$.vec[0].i128.lo'))
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'withdraw' THEN COALESCE(JSON_VALUE(data, '$.vec[1].i128'), JSON_VALUE(data, '$.vec[1].i128.lo'))
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('claim', 'donate') THEN COALESCE(JSON_VALUE(data, '$.i128'), JSON_VALUE(data, '$.i128.lo'))
                    ELSE NULL
                  END, ''),
                  -- shares (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'deposit' THEN COALESCE(JSON_VALUE(data, '$.vec[1].i128'), JSON_VALUE(data, '$.vec[1].i128.lo'))
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('withdraw', 'queue_withdrawal') THEN COALESCE(JSON_VALUE(data, '$.vec[0].i128'), JSON_VALUE(data, '$.vec[0].i128.lo'))
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'dequeue_withdrawal' THEN COALESCE(JSON_VALUE(data, '$.i128'), JSON_VALUE(data, '$.i128.lo'))
                    ELSE NULL
                  END, ''),
                  -- q4w_exp (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'queue_withdrawal' THEN JSON_VALUE(data, '$.vec[1].u64')
                    ELSE NULL
                  END, ''),
                  -- emissions_amount (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'gulp_emissions' THEN COALESCE(JSON_VALUE(data, '$.vec[0].i128'), JSON_VALUE(data, '$.vec[0].i128.lo'))
                    ELSE NULL
                  END, ''),
                  -- emissions_shares (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'gulp_emissions' THEN COALESCE(JSON_VALUE(data, '$.vec[1].i128'), JSON_VALUE(data, '$.vec[1].i128.lo'))
                    ELSE NULL
                  END, '')
                ), 256), 1, 16)
              ) AS id,
              transaction_hash,
              ledger_sequence,
              ledger_closed_at,

              -- Action type
              JSON_VALUE(topics, '$[0].symbol') AS action_type,

              -- Pool address (NULL for claim - claim is global across all pools)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim'
                THEN NULL
                ELSE JSON_VALUE(topics, '$[1].address')
              END AS pool_address,

              -- User address
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim'
                THEN JSON_VALUE(topics, '$[1].address')
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('gulp_emissions', 'draw')
                THEN NULL
                ELSE JSON_VALUE(topics, '$[2].address')
              END AS user_address,

              -- LP tokens amount
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'deposit'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[0].i128'),
                  JSON_VALUE(data, '$.vec[0].i128.lo')
                ) AS DECIMAL)
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'withdraw'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].i128'),
                  JSON_VALUE(data, '$.vec[1].i128.lo')
                ) AS DECIMAL)
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('claim', 'donate')
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.i128'),
                  JSON_VALUE(data, '$.i128.lo')
                ) AS DECIMAL)
                ELSE NULL
              END AS lp_tokens,

              -- Shares amount
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'deposit'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].i128'),
                  JSON_VALUE(data, '$.vec[1].i128.lo')
                ) AS DECIMAL)
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('withdraw', 'queue_withdrawal')
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[0].i128'),
                  JSON_VALUE(data, '$.vec[0].i128.lo')
                ) AS DECIMAL)
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'dequeue_withdrawal'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.i128'),
                  JSON_VALUE(data, '$.i128.lo')
                ) AS DECIMAL)
                ELSE NULL
              END AS shares,

              -- Queue expiration timestamp (queue_withdrawal only)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'queue_withdrawal'
                THEN CAST(JSON_VALUE(data, '$.vec[1].u64') AS BIGINT)
                ELSE NULL
              END AS q4w_exp,

              -- Emissions amount (gulp_emissions only) - BLND tokens gulped
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'gulp_emissions'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[0].i128'),
                  JSON_VALUE(data, '$.vec[0].i128.lo')
                ) AS DECIMAL)
                ELSE NULL
              END AS emissions_amount,

              -- Emissions shares (gulp_emissions only) - shares/tokens delta
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'gulp_emissions'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].i128'),
                  JSON_VALUE(data, '$.vec[1].i128.lo')
                ) AS DECIMAL)
                ELSE NULL
              END AS emissions_shares,

              -- Data source marker
              'gs' AS src

            FROM backstop_events
            WHERE JSON_VALUE(topics, '$[0].symbol') IN (
              'deposit',
              'withdraw',
              'queue_withdrawal',
              'dequeue_withdrawal',
              'claim',
              'donate',
              'draw',
              'gulp_emissions'
            )
  parsed_events:
    type: sql
    primary_key: id
    sql: |-
      SELECT
              -- Construct ID using content hash of PARSED values: {ledger}-{hash16}
              -- Hash uses the same parsed values that get stored in the database
              CONCAT(
                CAST(ledger_sequence AS VARCHAR), '-',
                SUBSTRING(SHA2(CONCAT(
                  COALESCE(transaction_hash, ''),
                  -- pool_id
                  COALESCE(contract_id, ''),
                  -- action_type
                  COALESCE(JSON_VALUE(topics, '$[0].symbol'), ''),
                  -- asset_address
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim' THEN JSON_VALUE(topics, '$[2].address')
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction') THEN NULL
                    ELSE JSON_VALUE(topics, '$[1].address')
                  END, ''),
                  -- user_address
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim' THEN JSON_VALUE(topics, '$[1].address')
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction') THEN COALESCE(JSON_VALUE(topics, '$[2].address'), JSON_VALUE(topics, '$[1].address'))
                    ELSE JSON_VALUE(topics, '$[2].address')
                  END, ''),
                  -- amount_underlying (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction') THEN NULL
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim' THEN COALESCE(JSON_VALUE(data, '$.vec[1].i128'), JSON_VALUE(data, '$.vec[1].i128.lo'))
                    ELSE COALESCE(JSON_VALUE(data, '$.vec[0].i128'), JSON_VALUE(data, '$.vec[0].i128.lo'), JSON_VALUE(data, '$.i128'))
                  END, ''),
                  -- amount_tokens (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction', 'claim') THEN NULL
                    ELSE COALESCE(JSON_VALUE(data, '$.vec[1].i128'), JSON_VALUE(data, '$.vec[1].i128.lo'))
                  END, ''),
                  -- auction_type (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction') THEN JSON_VALUE(topics, '$[1].u32')
                    ELSE NULL
                  END, ''),
                  -- filler_address
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'fill_auction' THEN COALESCE(JSON_VALUE(data, '$.vec[0].address'), JSON_VALUE(data, '$[0].address'))
                    ELSE NULL
                  END, ''),
                  -- liquidation_percent (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'new_auction' THEN COALESCE(JSON_VALUE(data, '$.vec[0].u32'), JSON_VALUE(data, '$[0].u32'))
                    WHEN JSON_VALUE(topics, '$[0].symbol') = 'fill_auction' THEN COALESCE(JSON_VALUE(data, '$.vec[1].i128'), JSON_VALUE(data, '$.vec[1].i128.lo'))
                    ELSE NULL
                  END, ''),
                  -- bid_asset
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction') THEN COALESCE(JSON_VALUE(data, '$.vec[1].map[0].val.map[0].key.address'), JSON_VALUE(data, '$.vec[2].map[0].val.map[0].key.address'))
                    ELSE NULL
                  END, ''),
                  -- bid_amount (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction') THEN COALESCE(JSON_VALUE(data, '$.vec[1].map[0].val.map[0].val.i128'), JSON_VALUE(data, '$.vec[1].map[0].val.map[0].val.i128.lo'), JSON_VALUE(data, '$.vec[2].map[0].val.map[0].val.i128'), JSON_VALUE(data, '$.vec[2].map[0].val.map[0].val.i128.lo'))
                    ELSE NULL
                  END, ''),
                  -- lot_asset
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction') THEN COALESCE(JSON_VALUE(data, '$.vec[1].map[2].val.map[0].key.address'), JSON_VALUE(data, '$.vec[2].map[2].val.map[0].key.address'))
                    ELSE NULL
                  END, ''),
                  -- lot_amount (as string)
                  COALESCE(CASE
                    WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction') THEN COALESCE(JSON_VALUE(data, '$.vec[1].map[2].val.map[0].val.i128'), JSON_VALUE(data, '$.vec[1].map[2].val.map[0].val.i128.lo'), JSON_VALUE(data, '$.vec[2].map[2].val.map[0].val.i128'), JSON_VALUE(data, '$.vec[2].map[2].val.map[0].val.i128.lo'))
                    ELSE NULL
                  END, '')
                ), 256), 1, 16)
              ) AS id,
              contract_id AS pool_id,
              transaction_hash,
              ledger_sequence,
              ledger_closed_at,
              JSON_VALUE(topics, '$[0].symbol') AS action_type,
              -- Asset address (NULL for auction events)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim'
                THEN JSON_VALUE(topics, '$[2].address')
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction')
                THEN NULL
                ELSE JSON_VALUE(topics, '$[1].address')
              END AS asset_address,
              -- User address extraction
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim'
                THEN JSON_VALUE(topics, '$[1].address')
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction')
                THEN COALESCE(
                  JSON_VALUE(topics, '$[2].address'),
                  JSON_VALUE(topics, '$[1].address')
                )
                ELSE JSON_VALUE(topics, '$[2].address')
              END AS user_address,
              -- Amount underlying (standard actions only)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction')
                THEN NULL
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'claim'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].i128'),
                  JSON_VALUE(data, '$.vec[1].i128.lo')
                ) AS DECIMAL)
                ELSE CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[0].i128'),
                  JSON_VALUE(data, '$.vec[0].i128.lo'),
                  JSON_VALUE(data, '$.i128')
                ) AS DECIMAL)
              END AS amount_underlying,
              -- Token amount (standard actions only)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction', 'claim')
                THEN NULL
                ELSE CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].i128'),
                  JSON_VALUE(data, '$.vec[1].i128.lo')
                ) AS DECIMAL)
              END AS amount_tokens,
              -- Implied rate (standard supply/borrow actions only)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('fill_auction', 'new_auction', 'claim')
                THEN NULL
                WHEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].i128'),
                  JSON_VALUE(data, '$.vec[1].i128.lo')
                ) AS DECIMAL) > 0
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[0].i128'),
                  JSON_VALUE(data, '$.vec[0].i128.lo')
                ) AS DECIMAL) / CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].i128'),
                  JSON_VALUE(data, '$.vec[1].i128.lo')
                ) AS DECIMAL)
                ELSE NULL
              END AS implied_rate,
              -- Auction type (0=liquidation, 1=bad_debt, 2=interest)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction')
                THEN CAST(JSON_VALUE(topics, '$[1].u32') AS INTEGER)
                ELSE NULL
              END AS auction_type,
              -- Filler address (fill_auction only - who filled the auction)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'fill_auction'
                THEN COALESCE(
                  JSON_VALUE(data, '$.vec[0].address'),
                  JSON_VALUE(data, '$[0].address')
                )
                ELSE NULL
              END AS filler_address,
              -- Liquidation percent (new_auction: % of position, fill_auction: fill %)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'new_auction'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[0].u32'),
                  JSON_VALUE(data, '$[0].u32')
                ) AS INTEGER)
                WHEN JSON_VALUE(topics, '$[0].symbol') = 'fill_auction'
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].i128'),
                  JSON_VALUE(data, '$.vec[1].i128.lo')
                ) AS INTEGER)
                ELSE NULL
              END AS liquidation_percent,
              -- Auction bid asset (first asset in bid map)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction')
                THEN COALESCE(
                  JSON_VALUE(data, '$.vec[1].map[0].val.map[0].key.address'),
                  JSON_VALUE(data, '$.vec[2].map[0].val.map[0].key.address')
                )
                ELSE NULL
              END AS bid_asset,
              -- Auction bid amount
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction')
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].map[0].val.map[0].val.i128'),
                  JSON_VALUE(data, '$.vec[1].map[0].val.map[0].val.i128.lo'),
                  JSON_VALUE(data, '$.vec[2].map[0].val.map[0].val.i128'),
                  JSON_VALUE(data, '$.vec[2].map[0].val.map[0].val.i128.lo')
                ) AS DECIMAL)
                ELSE NULL
              END AS bid_amount,
              -- Auction lot asset (first asset in lot map)
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction')
                THEN COALESCE(
                  JSON_VALUE(data, '$.vec[1].map[2].val.map[0].key.address'),
                  JSON_VALUE(data, '$.vec[2].map[2].val.map[0].key.address')
                )
                ELSE NULL
              END AS lot_asset,
              -- Auction lot amount
              CASE
                WHEN JSON_VALUE(topics, '$[0].symbol') IN ('new_auction', 'fill_auction')
                THEN CAST(COALESCE(
                  JSON_VALUE(data, '$.vec[1].map[2].val.map[0].val.i128'),
                  JSON_VALUE(data, '$.vec[1].map[2].val.map[0].val.i128.lo'),
                  JSON_VALUE(data, '$.vec[2].map[2].val.map[0].val.i128'),
                  JSON_VALUE(data, '$.vec[2].map[2].val.map[0].val.i128.lo')
                ) AS DECIMAL)
                ELSE NULL
              END AS lot_amount,
              -- Data source
              'gs' AS src
            FROM blend_events
            WHERE JSON_VALUE(topics, '$[0].symbol') IN (
              'supply', 'withdraw',
              'supply_collateral', 'withdraw_collateral',
              'borrow', 'repay',
              'claim',
              'new_auction',
              'fill_auction'
            )
sinks:
  sink_2:
    type: postgres
    table: backstop_events
    schema: public
    secret_name: POSTGRES_SECRET_CMINPMWGY0
    scan_autocommit: true
    from: parsed_backstop_events
    batch_size: 25
    rewrite_batched_inserts: true
  sink_1:
    type: postgres
    table: parsed_events
    schema: public
    secret_name: POSTGRES_SECRET_CMINPMWGY0
    scan_autocommit: true
    from: parsed_events
    batch_size: 25
    rewrite_batched_inserts: true
use_dedicated_ip: false